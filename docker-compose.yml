name: dine-sync

services:
    # ──────────────────────────────────────────────────────────────
    # INFRASTRUCTURE
    # ──────────────────────────────────────────────────────────────

    postgres-auth:
        image: postgres:16-alpine
        container_name: ds-postgres-auth
        restart: unless-stopped
        environment:
            POSTGRES_DB: auth_db
            POSTGRES_USER: ${POSTGRES_USER:-dinesync}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
        volumes:
            - postgres_auth_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dinesync} -d auth_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-restaurant:
        image: postgres:16-alpine
        container_name: ds-postgres-restaurant
        restart: unless-stopped
        environment:
            POSTGRES_DB: restaurant_db
            POSTGRES_USER: ${POSTGRES_USER:-dinesync}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
        volumes:
            - postgres_restaurant_data:/var/lib/postgresql/data
        ports:
            - "5433:5432"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dinesync} -d restaurant_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-menu:
        image: postgres:16-alpine
        container_name: ds-postgres-menu
        restart: unless-stopped
        environment:
            POSTGRES_DB: menu_db
            POSTGRES_USER: ${POSTGRES_USER:-dinesync}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
        volumes:
            - postgres_menu_data:/var/lib/postgresql/data
        ports:
            - "5434:5432"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dinesync} -d menu_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-order:
        image: postgres:16-alpine
        container_name: ds-postgres-order
        restart: unless-stopped
        environment:
            POSTGRES_DB: order_db
            POSTGRES_USER: ${POSTGRES_USER:-dinesync}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
        volumes:
            - postgres_order_data:/var/lib/postgresql/data
        ports:
            - "5435:5432"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dinesync} -d order_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-kitchen:
        image: postgres:16-alpine
        container_name: ds-postgres-kitchen
        restart: unless-stopped
        environment:
            POSTGRES_DB: kitchen_queue_db
            POSTGRES_USER: ${POSTGRES_USER:-dinesync}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
        volumes:
            - postgres_kitchen_data:/var/lib/postgresql/data
        ports:
            - "5436:5432"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dinesync} -d kitchen_queue_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-payment:
        image: postgres:16-alpine
        container_name: ds-postgres-payment
        restart: unless-stopped
        environment:
            POSTGRES_DB: payment_db
            POSTGRES_USER: ${POSTGRES_USER:-dinesync}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
        volumes:
            - postgres_payment_data:/var/lib/postgresql/data
        ports:
            - "5437:5432"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dinesync} -d payment_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-inventory:
        image: postgres:16-alpine
        container_name: ds-postgres-inventory
        restart: unless-stopped
        environment:
            POSTGRES_DB: inventory_db
            POSTGRES_USER: ${POSTGRES_USER:-dinesync}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
        volumes:
            - postgres_inventory_data:/var/lib/postgresql/data
        ports:
            - "5438:5432"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dinesync} -d inventory_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-notification:
        image: postgres:16-alpine
        container_name: ds-postgres-notification
        restart: unless-stopped
        environment:
            POSTGRES_DB: notification_db
            POSTGRES_USER: ${POSTGRES_USER:-dinesync}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
        volumes:
            - postgres_notification_data:/var/lib/postgresql/data
        ports:
            - "5439:5432"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dinesync} -d notification_db"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: ds-redis
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        ports:
            - "6379:6379"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Single-node Kafka broker (KRaft mode — no separate Zookeeper needed).
    # order-service/kitchen-queue-service/payment-service/inventory-service/
    # notification-service all connect to this via KAFKA_BROKERS=kafka:9092.
    kafka:
        image: bitnamilegacy/kafka:3.7.1
        container_name: ds-kafka
        restart: unless-stopped
        environment:
            KAFKA_CFG_NODE_ID: 0
            KAFKA_CFG_PROCESS_ROLES: controller,broker
            KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
            KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
            KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
            KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
            KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
            ALLOW_PLAINTEXT_LISTENER: "yes"
        volumes:
            - kafka_data:/bitnami/kafka
        ports:
            - "29092:29092"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
            interval: 15s
            timeout: 10s
            retries: 10

    # ──────────────────────────────────────────────────────────────
    # SERVICES
    # ──────────────────────────────────────────────────────────────

    api-gateway:
        build:
            context: ./api-gateway
            dockerfile: Dockerfile
        container_name: ds-api-gateway
        restart: unless-stopped
        depends_on:
            redis:
                condition: service_healthy
        env_file: ./api-gateway/.env
        environment:
            PORT: 8000
            NODE_ENV: development
            REDIS_HOST: redis
            REDIS_PORT: 6379
            AUTH_SERVICE_URL: http://auth-service:8001
            RESTAURANT_SERVICE_URL: http://restaurant-service:8002
            MENU_SERVICE_URL: http://menu-service:8003
            ORDER_SERVICE_URL: http://order-service:8004
            KITCHEN_SERVICE_URL: http://kitchen-queue-service:8005
            PAYMENT_SERVICE_URL: http://payment-service:8006
            INVENTORY_SERVICE_URL: http://inventory-service:8007
            NOTIFICATION_SERVICE_URL: http://notification-service:8008
        ports:
            - "8000:8000"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

    auth-service:
        build:
            context: ./services/auth-service
            dockerfile: Dockerfile
        container_name: ds-auth-service
        restart: unless-stopped
        depends_on:
            postgres-auth:
                condition: service_healthy
        env_file: ./services/auth-service/.env
        environment:
            PORT: 8001
            NODE_ENV: development
            DATABASE_URL: postgresql://${POSTGRES_USER:-dinesync}:${POSTGRES_PASSWORD:-secret}@postgres-auth:5432/auth_db
        ports:
            - "8001:8001"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

    restaurant-service:
        build:
            context: ./services/restaurant-service
            dockerfile: Dockerfile
        container_name: ds-restaurant-service
        restart: unless-stopped
        depends_on:
            postgres-restaurant:
                condition: service_healthy
        env_file: ./services/restaurant-service/.env
        environment:
            PORT: 8002
            NODE_ENV: development
            DATABASE_URL: postgresql://${POSTGRES_USER:-dinesync}:${POSTGRES_PASSWORD:-secret}@postgres-restaurant:5432/restaurant_db
        ports:
            - "8002:8002"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

    menu-service:
        build:
            context: ./services/menu-service
            dockerfile: Dockerfile
        container_name: ds-menu-service
        restart: unless-stopped
        depends_on:
            postgres-menu:
                condition: service_healthy
        env_file: ./services/menu-service/.env
        environment:
            PORT: 8003
            NODE_ENV: development
            DATABASE_URL: postgresql://${POSTGRES_USER:-dinesync}:${POSTGRES_PASSWORD:-secret}@postgres-menu:5432/menu_db
        ports:
            - "8003:8003"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

    order-service:
        build:
            context: ./services/order-service
            dockerfile: Dockerfile
        container_name: ds-order-service
        restart: unless-stopped
        depends_on:
           postgres-order:
                condition: service_healthy
           kafka:
                condition: service_healthy
        env_file: ./services/order-service/.env
        environment:
            PORT: 8004
            NODE_ENV: development
            DATABASE_URL: postgresql://${POSTGRES_USER:-dinesync}:${POSTGRES_PASSWORD:-secret}@postgres-order:5432/order_db
            REDIS_HOST: redis
            REDIS_PORT: 6379
            KAFKA_BROKERS: kafka:9092
            RESTAURANT_SERVICE_URL: http://restaurant-service:8002
            MENU_SERVICE_URL: http://menu-service:8003
        ports:
            - "8004:8004"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8004/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

    kitchen-queue-service:
        build:
            context: ./services/kitchen-queue-service
            dockerfile: Dockerfile
        container_name: ds-kitchen-queue-service
        restart: unless-stopped
        depends_on:
            postgres-kitchen:
                condition: service_healthy
            kafka:
                condition: service_healthy
        env_file: ./services/kitchen-queue-service/.env
        environment:
            PORT: 8005
            NODE_ENV: development
            DATABASE_URL: postgresql://${POSTGRES_USER:-dinesync}:${POSTGRES_PASSWORD:-secret}@postgres-kitchen:5432/kitchen_queue_db
            KAFKA_BROKERS: kafka:9092
        ports:
            - "8005:8005"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8005/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

    payment-service:
        build:
            context: ./services/payment-service
            dockerfile: Dockerfile
        container_name: ds-payment-service
        restart: unless-stopped
        depends_on:
            postgres-payment:
                condition: service_healthy
            kafka:
                condition: service_healthy
        env_file: ./services/payment-service/.env
        environment:
            PORT: 8006
            NODE_ENV: development
            DATABASE_URL: postgresql://${POSTGRES_USER:-dinesync}:${POSTGRES_PASSWORD:-secret}@postgres-payment:5432/payment_db
            KAFKA_BROKERS: kafka:9092
        ports:
            - "8006:8006"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8006/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

    inventory-service:
        build:
            context: ./services/inventory-service
            dockerfile: Dockerfile
        container_name: ds-inventory-service
        restart: unless-stopped
        depends_on:
            postgres-inventory:
                condition: service_healthy
            kafka:
                condition: service_healthy
        env_file: ./services/inventory-service/.env
        environment:
            PORT: 8007
            NODE_ENV: development
            DATABASE_URL: postgresql://${POSTGRES_USER:-dinesync}:${POSTGRES_PASSWORD:-secret}@postgres-inventory:5432/inventory_db
            KAFKA_BROKERS: kafka:9092
        ports:
            - "8007:8007"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8007/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

    notification-service:
        build:
            context: ./services/notification-service
            dockerfile: Dockerfile
        container_name: ds-notification-service
        restart: unless-stopped
        depends_on:
            postgres-notification:
                condition: service_healthy
            kafka:
                condition: service_healthy
        env_file: ./services/notification-service/.env
        environment:
            PORT: 8008
            NODE_ENV: development
            DATABASE_URL: postgresql://${POSTGRES_USER:-dinesync}:${POSTGRES_PASSWORD:-secret}@postgres-notification:5432/notification_db
            KAFKA_BROKERS: kafka:9092
        ports:
            - "8008:8008"
        networks:
            - dine-sync-net
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:8008/health || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

# ──────────────────────────────────────────────────────────────────
# VOLUMES
# ──────────────────────────────────────────────────────────────────

volumes:
    postgres_auth_data:
    postgres_restaurant_data:
    postgres_menu_data:
    postgres_order_data:
    postgres_kitchen_data:
    postgres_payment_data:
    postgres_inventory_data:
    postgres_notification_data:
    redis_data:
    kafka_data:

# ──────────────────────────────────────────────────────────────────
# NETWORKS
# ──────────────────────────────────────────────────────────────────

networks:
    dine-sync-net:
        driver: bridge
